<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manutenção - ONG Amor Animal</title>
  <link rel="stylesheet" href="../static/css/default.css">
  <link rel="stylesheet" href="../static/css/icons/bootstrap-icons.min.css">
  <link rel="icon" type="image/png" href="../static/css/favicon/ong.ico">
  <style>
    .manutencao-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
      text-align: center;
      padding: 2rem;
    }
    .manutencao-icon {
      font-size: 5rem;
      color: #e67e22;
      margin-bottom: 1.5rem;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.05); }
    }
    .manutencao-titulo {
      font-size: 1.8rem;
      color: var(--text-color, #333);
      margin-bottom: 1rem;
      font-weight: 700;
    }
    .manutencao-msg {
      font-size: 1.1rem;
      color: var(--text-secondary, #666);
      max-width: 500px;
      line-height: 1.6;
    }
    .manutencao-btn {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      background-color: #28a745;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background-color 0.2s;
    }
    .manutencao-btn:hover {
      background-color: #218838;
      text-decoration: none;
    }
  </style>
</head>
<body>

<script>var ROOT='..';</script>
<script src="../components/header.js"></script>

<div class="container">
  <div class="manutencao-container">
    <div class="manutencao-icon">
      <i class="bi bi-tools"></i>
    </div>
    <h1 class="manutencao-titulo">Desculpe-nos pelo Transtorno</h1>
    <p class="manutencao-msg">
      Estamos temporariamente em manutenção.<br>
      Nosso sistema está passando por melhorias para oferecer uma experiência ainda melhor.
    </p>
    <p class="manutencao-msg" style="margin-top: 0.5rem; font-size: 0.95rem;">
      Tente novamente em alguns minutos.
    </p>
    <a href="../index.html" class="manutencao-btn">
      <i class="bi bi-arrow-left"></i> Voltar para a página inicial
    </a>
  </div>
</div>

<script src="../components/footer.js"></script>

</body>
</html>
